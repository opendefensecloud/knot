# Dev compose: Postgres + Dex.

services:
  postgres:
    image: postgres:18-alpine
    container_name: knot-dev-postgres
    environment:
      POSTGRES_DB: knot
      POSTGRES_USER: knot
      POSTGRES_PASSWORD: knot
    ports:
      - "5432:5432"
    volumes:
      - knot-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knot -d knot"]
      interval: 2s
      timeout: 5s
      retries: 30

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    container_name: knot-dev-dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 2s
      timeout: 5s
      retries: 30

  toxiproxy:
    # Sits between the browser/e2e and knot-server. Admin API on :8474,
    # proxy listener on :3001 → 127.0.0.1:3000 (host's knot-server).
    image: ghcr.io/shopify/toxiproxy:2.12.0
    container_name: knot-dev-toxiproxy
    command: ["-host", "0.0.0.0", "-port", "8474", "-config", "/etc/toxiproxy/init.json"]
    network_mode: host
    volumes:
      - ./toxiproxy/init.json:/etc/toxiproxy/init.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8474/version || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  knot-dev-postgres:
