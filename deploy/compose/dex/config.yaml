# Dex dev IdP — static config for knot Plan 3.
# Two seeded users + one OIDC client. NOT for production use.

issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

staticClients:
  - id: knot
    secret: knot-dev-secret
    name: knot (dev)
    redirectURIs:
      - http://localhost:3000/auth/oidc/callback
      - http://localhost:5173/auth/oidc/callback

enablePasswordDB: true

# bcrypt hashes generated by `dex issuer hash` with password "password".
# These are dev-only credentials. Do not copy to production.
# Both users share the same bcrypt hash (password = "password") — dev-only convenience.
staticPasswords:
  - email: alice@example.com
    # password
    hash: "$2a$10$2b2cu2a5yuIceL9YQ8MgVuYJ1mfH4FUjJDIQ0vqI7eM7l9wGM2sBe"
    username: alice
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
    # Groups used to test OIDC role mapping (KNOT_OIDC_ROLE_FROM_GROUPS).
    # Dex doesn't ship groups from the password connector by default;
    # we rely on the `groups` mock connector in tests. For local play, alice
    # appears in no groups and falls through to KNOT_OIDC_AUTO_PROVISION rules.
  - email: bob@example.com
    # password
    hash: "$2a$10$2b2cu2a5yuIceL9YQ8MgVuYJ1mfH4FUjJDIQ0vqI7eM7l9wGM2sBe"
    username: bob
    userID: "9c7d1f7e-7d54-4a8f-9a37-7df6c79caa14"
