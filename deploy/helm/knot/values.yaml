# Default values for knot.
# Assumes EXTERNAL Postgres + OIDC. The dev-compose stack in deploy/compose
# is for local development only.

image:
  # Canonical upstream image. CI (release.yaml) publishes here on a v* tag,
  # stripping the leading "v" so the pushed tag matches .Chart.AppVersion.
  repository: ghcr.io/trevex/knot
  tag: ""              # defaults to .Chart.AppVersion at template-render time
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1

# Required: Postgres connection URL.
database:
  url: ""
  existingSecretName: ""
  existingSecretKey: "url"
  # Pool size per replica. Budget against Postgres max_connections:
  # roughly replicaCount * (maxConnections + 2).
  maxConnections: 16

# Required: session signing key (32 bytes).
session:
  key: ""
  existingSecretName: ""
  existingSecretKey: "key"

# Optional OIDC configuration.
oidc:
  enabled: false
  issuer: ""
  clientId: ""
  clientSecret: ""
  redirectUrl: ""              # https://<host>/auth/oidc/callback
  existingSecretName: ""
  autoProvision: "off"          # off | always | domain | group
  allowedDomains: ""
  roleFromGroups: ""

baseUrl: ""

logLevel: info
logFormat: json

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

metrics:
  enabled: true
  port: 9090

networkPolicy:
  enabled: false
  # Selectors describing who is allowed to reach the http port.
  # Empty list = no http ingress (useful with a sidecar-only deployment).
  # The chart does NOT default to allowing everything — explicit is safer.
  ingressFrom:
    - namespaceSelector: {}     # any namespace
      podSelector: {}            # any pod
  # Selectors for who can scrape the metrics port. Default: prometheus pod.
  metricsIngressFrom:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  namespace: ""
  labels: {}
  metricRelabelings: []
  relabelings: []

alerting:
  enabled: false
  pageSeverity: critical
  ticketSeverity: warning
  errorBudgetTarget: 0.995
  latencyP95Target: 0.25

tracing:
  enabled: false
  otlpEndpoint: ""     # e.g. http://otel-collector.observability.svc.cluster.local:4317

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: knot.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Blob storage backend.
#   postgres — bytea in the same DB as everything else (10 MB hard cap)
#   s3       — S3-compatible (AWS S3, MinIO, R2). Requires building knot-server
#              with --features s3 and supplying AWS creds via existingSecretName.
blob:
  backend: postgres
  s3:
    bucket: ""
    endpoint: ""        # e.g. http://minio.svc.cluster.local:9000
    region: us-east-1
    prefix: ""
    # AWS creds via existingSecret with AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
    existingSecretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

migrations:
  enabled: true
  backoffLimit: 3

probes:
  enabled: true

# Graceful shutdown. On SIGTERM the server stops accepting connections, sends
# a 1001 Close to live collab WebSockets, and drains in-flight HTTP. preStop
# sleeps first so the pod leaves Service endpoints before draining begins
# (kube-proxy stops routing new traffic). Uses the native `sleep` lifecycle
# handler — no shell, so it works on the scratch image.
terminationGracePeriodSeconds: 30
preStopSleepSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}
