{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "knot.serviceAccountName" . }}
  labels:
    {{- include "knot.labels" . | nindent 4 }}
  annotations:
    # Created as a pre-install/pre-upgrade hook ahead of the migrate Job
    # (hook-weight -5) so the Job can reference it; without this the SA is a
    # normal resource applied only in the main phase, and the pre-install
    # migrate hook fails with `serviceaccount not found`.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
