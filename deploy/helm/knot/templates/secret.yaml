{{- $renderDb := not .Values.database.existingSecretName -}}
{{- $renderSession := not .Values.session.existingSecretName -}}
{{- $renderOidc := and .Values.oidc.enabled .Values.oidc.clientSecret (not .Values.oidc.existingSecretName) -}}
{{- if or $renderDb $renderSession $renderOidc -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "knot.fullname" . }}
  labels:
    {{- include "knot.labels" . | nindent 4 }}
  annotations:
    # Pre-install/pre-upgrade hook (weight -10) so the migrate Job (weight -5),
    # which references this Secret, can start. Mirrors the ConfigMap and
    # ServiceAccount hooks. Only the values supplied inline are rendered here;
    # values backed by an existingSecretName are referenced directly.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  {{- if $renderDb }}
  KNOT_DATABASE_URL: {{ required "database.url or database.existingSecretName is required" .Values.database.url | quote }}
  {{- end }}
  {{- if $renderSession }}
  KNOT_SESSION_KEY: {{ required "session.key or session.existingSecretName is required" .Values.session.key | quote }}
  {{- end }}
  {{- if $renderOidc }}
  KNOT_OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  {{- end }}
{{- end -}}
