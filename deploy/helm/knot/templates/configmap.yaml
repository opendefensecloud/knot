apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "knot.fullname" . }}
  labels:
    {{- include "knot.labels" . | nindent 4 }}
  annotations:
    # Pre-install/pre-upgrade hook (weight -10) so the migrate Job (weight -5),
    # which references this ConfigMap via envFrom, can start. As a plain
    # resource it would only be applied in the main phase, after the hook.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  KNOT_LOG_LEVEL: {{ .Values.logLevel | quote }}
  KNOT_LOG_FORMAT: {{ .Values.logFormat | quote }}
  KNOT_BASE_URL: {{ .Values.baseUrl | quote }}
  KNOT_DB_MAX_CONNECTIONS: {{ .Values.database.maxConnections | quote }}
  {{- if .Values.oidc.enabled }}
  KNOT_OIDC_ENABLED: "true"
  KNOT_OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  KNOT_OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
  KNOT_OIDC_REDIRECT_URL: {{ .Values.oidc.redirectUrl | quote }}
  KNOT_OIDC_AUTO_PROVISION: {{ .Values.oidc.autoProvision | quote }}
  {{- with .Values.oidc.allowedDomains }}
  KNOT_OIDC_ALLOWED_DOMAINS: {{ . | quote }}
  {{- end }}
  {{- with .Values.oidc.roleFromGroups }}
  KNOT_OIDC_ROLE_FROM_GROUPS: {{ . | quote }}
  {{- end }}
  {{- with .Values.oidc.extraAudiences }}
  KNOT_OIDC_EXTRA_AUDIENCES: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.tracing.enabled }}
  KNOT_TRACING_ENABLED: "true"
  KNOT_OTLP_ENDPOINT: {{ required "tracing.otlpEndpoint is required when tracing.enabled=true" .Values.tracing.otlpEndpoint | quote }}
  {{- end }}
  KNOT_BLOB_BACKEND: {{ .Values.blob.backend | quote }}
  {{- if eq .Values.blob.backend "s3" }}
  KNOT_S3_BUCKET:   {{ required "blob.s3.bucket is required when backend=s3" .Values.blob.s3.bucket | quote }}
  KNOT_S3_ENDPOINT: {{ .Values.blob.s3.endpoint | quote }}
  KNOT_S3_REGION:   {{ .Values.blob.s3.region | quote }}
  KNOT_S3_PREFIX:   {{ .Values.blob.s3.prefix | quote }}
  {{- end }}
