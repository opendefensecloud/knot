{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "knot.fullname" . }}-migrate
  labels:
    {{- include "knot.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "knot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "knot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/knot-server", "migrate"]
          env:
            - name: KNOT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "knot.dbSecretName" . }}
                  key: {{ include "knot.dbSecretKey" . }}
          envFrom:
            - configMapRef:
                name: {{ include "knot.fullname" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
{{- end -}}
