name: Helm chart CI

on:
  pull_request:
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-ci.yaml"
  push:
    branches: [main, master]
    paths:
      - "deploy/helm/**"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: ct lint
        run: ct lint --target-branch main --chart-dirs deploy/helm

      # NOTE: `ct install` (deploy-to-kind smoke test) is intentionally omitted:
      # the chart's default image is not published yet, so an install hits
      # ImagePullBackOff. Restore it once the release pipeline publishes an
      # image (build + kind-load the image, deploy a throwaway Postgres, then
      # `ct install` with migrations + probes enabled). The e2e workflow already
      # exercises the binary against Postgres in the meantime.
