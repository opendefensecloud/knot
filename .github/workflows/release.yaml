name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege by default; the image job widens to what it needs.
permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr
      id-token: write # keyless cosign signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + OCI labels/annotations)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # {{version}} strips the leading "v" (v0.1.0 -> 0.1.0) to match Chart.AppVersion;
          # {{major}}.{{minor}} -> 0.1. flavor latest=auto (default) adds :latest for
          # non-prerelease semver tags. Emits org.opencontainers.image.* labels (source,
          # revision, version, created, licenses) so ghcr links the package to this repo.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build + push multi-arch
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # Stamp the binary so its /api/version matches the OCI image.version label + chart appVersion.
          build-args: |
            KNOT_VERSION=${{ steps.meta.outputs.version }}
            KNOT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain attestations attached to the image manifest in ghcr.
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        # Sign by digest so the signature covers every tag that points at this build.
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"

  chart:
    runs-on: ubuntu-latest
    needs: image
    permissions:
      contents: read
      packages: write # push the OCI chart to ghcr
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0
      - name: Package + push chart to ghcr (OCI)
        # appVersion is forced to the stripped git tag so the chart deploys exactly the image
        # this release built; the chart's own version comes from Chart.yaml (bump it when the
        # chart changes). Lands at oci://ghcr.io/<owner>/charts/knot:<chart-version>.
        env:
          REF: ${{ github.ref_name }}
        run: |
          APP_VERSION="${REF#v}"   # v0.1.0 -> 0.1.0
          helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          mkdir -p dist
          helm package deploy/helm/knot --app-version "$APP_VERSION" -d dist
          helm push dist/knot-*.tgz "oci://ghcr.io/${{ github.repository_owner }}/charts"

  release:
    runs-on: ubuntu-latest
    needs: [image, chart]
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - name: Derive versions
        id: v
        run: |
          echo "image=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "chart=$(awk '/^version:/{print $2; exit}' deploy/helm/knot/Chart.yaml)" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ### Container image
            `ghcr.io/${{ github.repository }}:${{ steps.v.outputs.image }}` — multi-arch (amd64/arm64), cosign-signed, with SBOM + SLSA provenance.

            ### Helm chart
            ```sh
            helm install knot oci://ghcr.io/${{ github.repository_owner }}/charts/knot \
              --version ${{ steps.v.outputs.chart }} \
              -n knot --create-namespace \
              --set database.url='postgres://…' \
              --set session.key="$(openssl rand -base64 32)" \
              --set baseUrl=https://knot.example.com
            ```
            Full values: [chart README](https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}/deploy/helm/knot).
