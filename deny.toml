# cargo-deny configuration for the knot workspace.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; transitive via testcontainers/bollard; superseded by rustls-pki-types in newer chains" },
    # rsa v0.9 has a known timing sidechannel (Marvin Attack). Reachable via
    # openidconnect -> oauth2 -> rsa for RS256 JWT signature verification (we
    # never decrypt, only verify). No safe upgrade is available upstream; the
    # RustCrypto/RSA team has not released a constant-time implementation as
    # of this writing. Tracked: https://github.com/RustCrypto/RSA/issues/626
    # Mitigation: Dex (our OIDC issuer) is deployed inside the same trust
    # boundary as the server, so network-observable timing is bounded.
    # Re-evaluate on every openidconnect/rsa release.
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin Attack via openidconnect; verification-only path; no upstream fix yet" },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",  # webpki-roots; permissive, LF-approved
]
confidence-threshold = 0.93

[[licenses.exceptions]]
# ring uses a custom not-quite-OpenSSL license; accept as a known exception.
name = "ring"
allow = ["OpenSSL", "ISC", "MIT"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true  # path = "../..." workspace internals
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
