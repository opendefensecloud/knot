[toolchain]
# Pinned (not "stable") so rustfmt/clippy are deterministic — a floating stable
# reformats/relints the whole repo on every new Rust release. Bump deliberately,
# and keep the dtolnay/rust-toolchain refs in .github/workflows/ci.yml in sync.
channel = "1.96.0"
components = ["rustfmt", "clippy", "rust-analyzer", "rust-src"]
targets = ["x86_64-unknown-linux-musl"]
profile = "minimal"
